[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "flashmoe"
version = "0.1.0"
description = "Completely Fused Distributed MoE"
requires-python = ">=3.10"
authors = [
  { name = "Osayamen Jonathan Aimuyo", email = "osayamen@stanford.edu" },
]

[tool.setuptools]
packages = ["flashmoe"]

[tool.setuptools.package-data]
# IMPORTANT: include the headers in the package
flashmoe = [
  "CMakeLists.txt",
]